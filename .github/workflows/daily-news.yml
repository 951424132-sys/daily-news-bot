name: Daily News Push with Stable PDF Link

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 新闻主题
        required: false
        default: 科技

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser fpdf2 typing_extensions

      - name: Run news bot, generate PDF and upload
        env:
          TOPIC: ${{ github.event.inputs.topic || '科技' }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL1: ${{ secrets.WECOM_WEBHOOK_URL1 }}
          WECOM_WEBHOOK_URL2: ${{ secrets.WECOM_WEBHOOK_URL2 }}
        run: |
          python3 - << 'PYTHON_SCRIPT'
          # -*- coding: utf-8 -*-
          import os
          import urllib.parse
          import requests
          import feedparser
          import re
          import json
          from datetime import datetime
          from fpdf import FPDF

          # ========== 配置 ==========
          TOPIC = os.environ.get('TOPIC', '科技')
          
          # 获取所有webhook地址
          webhook_urls = [
              os.environ.get('WECOM_WEBHOOK_URL', ''),
              os.environ.get('WECOM_WEBHOOK_URL1', ''),
              os.environ.get('WECOM_WEBHOOK_URL2', '')
          ]
          webhook_urls = [url for url in webhook_urls if url.strip()]
          
          print(f"📰 主题: {TOPIC}")
          print(f"📡 推送群数: {len(webhook_urls)}")

          # ========== 获取新闻 ==========
          news_items = []
          encoded_topic = urllib.parse.quote(TOPIC)
          
          rss_sources = [
              f"https://www.thepaper.cn/rss.jsp", # 澎湃新闻
              f"https://tech.sina.com.cn/rss/index.xml", # 新浪科技
              f"https://news.sohu.com/rss/scroll.xml", # 搜狐新闻
              f"https://www.163.com/rss/", # 网易新闻
          ]
          
          if TOPIC != '科技':
              rss_sources.insert(0, f"https://news.google.com/rss/search?q={encoded_topic}&hl=zh-CN&gl=CN&ceid=CN:zh")

          for source_url in rss_sources:
              if len(news_items) >= 10:
                  break
              try:
                  print(f"🔄 尝试: {source_url[:40]}...")
                  feed = feedparser.parse(source_url)
                  if feed.entries:
                      for entry in feed.entries:
                          if len(news_items) >= 10: break
                          title = re.sub(r' - .*$', '', entry.title).strip()
                          link = entry.link
                          if not any(item['title'] == title for item in news_items):
                              news_items.append({'title': title, 'link': link})
              except Exception as e:
                  print(f"❌ 获取失败: {str(e)[:50]}")
                  continue

          if not news_items:
              news_items.append({
                  'title': f"查看更多关于 '{TOPIC}' 的实时新闻",
                  'link': f"https://www.baidu.com/s?wd={encoded_topic}"
              })

          print(f"✅ 获取到 {len(news_items)} 条新闻")

          # ========== 生成 PDF 附件 ==========
          date_str = datetime.now().strftime('%Y-%m-%d')
          pdf_filename = f"news_summary_{date_str}.pdf"
          
          try:
              pdf = FPDF()
              pdf.add_page()
              pdf.set_font("Helvetica", "B", 16)
              pdf.cell(0, 10, f"Daily News Summary - {TOPIC}", ln=True, align='C')
              pdf.set_font("Helvetica", "", 12)
              pdf.cell(0, 10, f"Date: {date_str}", ln=True, align='C')
              pdf.ln(10)
              
              for i, item in enumerate(news_items, 1):
                  pdf.set_font("Helvetica", "B", 12)
                  clean_title = item['title'].encode('ascii', 'ignore').decode('ascii')
                  if not clean_title.strip(): clean_title = f"News Item {i}"
                  pdf.multi_cell(0, 10, f"{i}. {clean_title}")
                  pdf.set_font("Helvetica", "I", 10)
                  pdf.set_text_color(0, 0, 255)
                  pdf.cell(0, 10, "Link: " + item['link'], ln=True, link=item['link'])
                  pdf.set_text_color(0, 0, 0)
                  pdf.ln(5)
              
              pdf.output(pdf_filename)
              print(f"📄 PDF 已生成: {pdf_filename}")
          except Exception as e:
              print(f"❌ PDF 生成失败: {str(e)}")

          # ========== 上传 PDF 到临时云端存储 (file.io) ==========
          pdf_download_url = ""
          try:
              print(f"📤 正在上传 PDF 到 file.io...")
              with open(pdf_filename, 'rb') as f:
                  # file.io 默认有效期 14 天，上传成功率极高
                  response = requests.post('https://file.io', files={'file': f}, data={'expires': '14d'})
                  if response.status_code == 200:
                      result = response.json()
                      if result.get('success'):
                          pdf_download_url = result.get('link')
                          print(f"✅ PDF 上传成功: {pdf_download_url}")
                      else:
                          print(f"❌ file.io 返回失败: {result.get('message')}")
                  else:
                      print(f"❌ PDF 上传失败，状态码: {response.status_code}")
          except Exception as e:
              print(f"❌ PDF 上传异常: {str(e)}")

          # ========== 构建企业微信消息 ==========
          display_date = datetime.now().strftime('%Y年%m月%d日')
          msg = f"## ☀ 早安！今日资讯简报\n\n"
          msg += f"**📅 日期**: {display_date}\n"
          msg += f"**📌 主题**: {TOPIC}\n\n"
          
          # 显眼位置加入 PDF 查看链接
          if pdf_download_url:
              msg += f"📄 **[点击此处查看/下载 PDF 总结报告]({pdf_download_url})**\n\n"
          else:
              msg += f"⚠️ *PDF 总结上传失败，请在 GitHub Artifacts 中查看备份。*\n\n"
          
          msg += "---\n\n"
          for i, item in enumerate(news_items[:10], 1):
              msg += f"{i}. [{item['title']}]({item['link'].strip()})\n\n"
          
          msg += "---\n"
          msg += "💡 *祝您今天工作顺利！*"

          # ========== 发送消息 ==========
          success_count = 0
          for idx, webhook_url in enumerate(webhook_urls, 1):
              try:
                  print(f"📤 发送给群 {idx}...")
                  response = requests.post(
                      webhook_url,
                      json={'msgtype': 'markdown', 'markdown': {'content': msg}},
                      timeout=15,
                      headers={'Content-Type': 'application/json'}
                  )
                  if response.status_code == 200 and response.json().get('errcode') == 0:
                      print(f"   ✅ 群 {idx} 发送成功!")
                      success_count += 1
                  else:
                      print(f"   ❌ 发送失败: {response.text[:100]}")
              except Exception as e:
                  print(f"   ❌ 异常: {str(e)[:80]}")

          print(f"\n🏁 完成! 成功发送: {success_count}/{len(webhook_urls)}")
          PYTHON_SCRIPT

      - name: Upload PDF Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: news-summary-pdf
          path: news_summary_*.pdf
          retention-days: 7
