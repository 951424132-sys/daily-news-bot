name: Daily News Push with News Card

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 新闻主题
        required: false
        default: 科技
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0点（北京时间 8点）自动运行

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Run news bot and push card
        env:
          TOPIC: ${{ github.event.inputs.topic || '科技' }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL1: ${{ secrets.WECOM_WEBHOOK_URL1 }}
          WECOM_WEBHOOK_URL2: ${{ secrets.WECOM_WEBHOOK_URL2 }}
        run: |
          python3 - << 'PYTHON_SCRIPT'
          # -*- coding: utf-8 -*-
          import os
          import urllib.parse
          import requests
          import feedparser
          import re
          from datetime import datetime

          # ========== 配置 ==========
          TOPIC = os.environ.get('TOPIC', '科技')
          
          webhook_urls = [
              os.environ.get('WECOM_WEBHOOK_URL', ''),
              os.environ.get('WECOM_WEBHOOK_URL1', ''),
              os.environ.get('WECOM_WEBHOOK_URL2', '')
          ]
          webhook_urls = [url for url in webhook_urls if url.strip()]

          # ========== 获取新闻 ==========
          news_items = []
          encoded_topic = urllib.parse.quote(TOPIC)
          rss_sources = [
              f"https://www.thepaper.cn/rss.jsp",
              f"https://tech.sina.com.cn/rss/index.xml",
              f"https://news.sohu.com/rss/scroll.xml",
              f"https://www.163.com/rss/",
          ]
          if TOPIC != '科技':
              rss_sources.insert(0, f"https://news.google.com/rss/search?q={encoded_topic}&hl=zh-CN&gl=CN&ceid=CN:zh")

          for source_url in rss_sources:
              if len(news_items) >= 8: break # 企业微信图文卡片最多支持8条
              try:
                  feed = feedparser.parse(source_url)
                  for entry in feed.entries:
                      if len(news_items) >= 8: break
                      title = re.sub(r' - .*$', '', entry.title).strip()
                      link = entry.link
                      # 尝试获取描述作为摘要
                      description = re.sub(r'<[^>]+>', '', entry.get('summary', '')).strip()[:50]
                      if not description: description = f"点击查看关于 {TOPIC} 的最新报道"
                      
                      if not any(item['title'] == title for item in news_items):
                          news_items.append({
                              'title': title, 
                              'url': link,
                              'description': description,
                              'picurl': "https://img.icons8.com/color/96/news.png" # 默认图标
                          })
              except: continue

          if not news_items:
              news_items.append({
                  'title': f"查看更多关于 '{TOPIC}' 的实时新闻",
                  'url': f"https://www.baidu.com/s?wd={encoded_topic}",
                  'description': "点击进入搜索页面查看更多内容",
                  'picurl': "https://img.icons8.com/color/96/search.png"
              })

          # ========== 构建图文卡片消息 (news) ==========
          # 企业微信图文消息格式：https://developer.work.weixin.qq.com/document/path/91770#图文类型
          articles = []
          date_display = datetime.now().strftime('%Y年%m月%d日')
          
          # 第一条作为封面大图
          first_item = news_items[0]
          articles.append({
              "title": f"📰 {TOPIC}资讯简报 | {date_display}",
              "description": first_item['title'],
              "url": first_item['url'],
              "picurl": "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800&q=80" # 封面大图
          })
          
          # 后续条目作为列表
          for item in news_items[1:8]:
              articles.append({
                  "title": item['title'],
                  "url": item['url'],
                  "picurl": "https://img.icons8.com/color/48/news.png"
              })

          payload = {
              "msgtype": "news",
              "news": {
                 "articles": articles
              }
          }

          # ========== 发送消息 ==========
          for idx, webhook_url in enumerate(webhook_urls, 1):
              try:
                  response = requests.post(webhook_url, json=payload, timeout=15)
                  print(f"✅ 群 {idx} 消息已发送，状态码: {response.status_code}")
              except Exception as e:
                  print(f"❌ 群 {idx} 发送失败: {str(e)}")
          PYTHON_SCRIPT
